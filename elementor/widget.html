<style>
  .memoria-viva-wrap {
    box-sizing: border-box;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 1.25rem;
    width: 100%;
    margin: 0 auto;
    padding: 0;
    font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
    background: var(--page-bg, #f4f1eb);
  }

  .memoria-viva-wrap *,
  .memoria-viva-wrap *::before,
  .memoria-viva-wrap *::after {
    box-sizing: border-box;
  }

  .memoria-viva-wrap #scene {
    position: relative;
    width: 100%;
    max-width: var(--frame-max, min(920px, 96vw));
    aspect-ratio: 845 / 600;
    background: var(--frame-bg, #fff);
    border: 1px solid var(--frame-border, #d4cfc4);
    border-radius: 4px;
    overflow: hidden;
    touch-action: none;
    cursor: grab;
  }

  .memoria-viva-wrap #scene.is-dragging {
    cursor: grabbing;
  }

  .memoria-viva-wrap #letters-svg {
    display: block;
    width: 100%;
    height: 100%;
  }

  .memoria-viva-wrap #letters-svg .piece path {
    fill: var(--letter-fill, #030505);
  }

  .memoria-viva-wrap #status-msg {
    margin: 0;
    max-width: 32rem;
    text-align: center;
    font-size: 0.9rem;
    color: #8b2500;
  }

  .memoria-viva-wrap #status-msg[hidden] {
    display: none;
  }

  .memoria-viva-wrap #replay-btn {
    font: inherit;
    font-size: 0.95rem;
    letter-spacing: 0.02em;
    padding: 0.55rem 1.25rem;
    border: 1px solid var(--frame-border, #d4cfc4);
    border-radius: 999px;
    background: var(--frame-bg, #fff);
    color: var(--letter-fill, #030505);
    cursor: pointer;
  }

  .memoria-viva-wrap #replay-btn:hover {
    background: var(--page-bg, #f4f1eb);
  }

  .memoria-viva-wrap #replay-btn:focus-visible {
    outline: 2px solid var(--letter-fill, #030505);
    outline-offset: 2px;
  }
</style>
